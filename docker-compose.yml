services:
  gwmariadb:
    image: gwmariadb:latest
    container_name: gwmariadb
    ports:
      - "8080:3142"
    depends_on:
      - mariadb
    networks:
      - gwmariadb-network
    volumes:
      - ./:/var/www/html
    environment:
      HOME: /tmp
      TOKEN: 123
      DB_HOST: mariadb
      DB_NAME: admin
      DB_USER: admin
      DB_PASS: admin
      DB_PORT: 3306
    user: "${UID:-1000}:${GID:-1000}"

  mariadb:
    image: mariadb:11
    container_name: gwmariadb_mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: gwmariadb
    networks:
      - gwmariadb-network
    ports:
      - "8306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql

networks:
  gwmariadb-network:

volumes:
  db_data: